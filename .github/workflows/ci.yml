name: CI - Build and Push

on:
  push:
    branches: ["**"]
  workflow_dispatch:

env:
  IMAGE_NAME: cloudride-assignment

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Sanitize the branch name (e.g. "feature/foo" -> "feature-foo") so it is
      # a valid Docker tag, then combine with the build number: BRANCH-BUILD
      - name: Compute image tag
        id: tag
        run: |
          BRANCH_NAME="${GITHUB_REF_NAME//\//-}"
          BUILD_NUMBER="${GITHUB_RUN_NUMBER}"
          echo "image_tag=${BRANCH_NAME}-${BUILD_NUMBER}" >> "$GITHUB_OUTPUT"

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./app
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:${{ steps.tag.outputs.image_tag }}
